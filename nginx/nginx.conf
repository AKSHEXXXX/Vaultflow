# =============================================================================
# Nginx Reverse Proxy Configuration
# SaaS Backend — Phase 8 Deployment
# =============================================================================

# --- Rate Limiting Zones ---
# 100 requests/min per IP for general API endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
# 10 requests/min per IP for auth endpoints (login, register, token refresh)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# --- Upstream ---
upstream backend {
    server backend:8080;
    keepalive 32;
}

# =============================================================================
# HTTP → HTTPS redirect
# =============================================================================
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge through HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — Main Server Block
# =============================================================================
server {
    listen 443 ssl http2;
    server_name _;

    # ----- SSL Certificates -----
    # Mount self-signed or Let's Encrypt certs at nginx/certs/
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS — 2 year max-age, includeSubDomains (enable after DNS/cert is stable)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ----- Security Headers -----
    add_header X-Frame-Options            "DENY"            always;
    add_header X-Content-Type-Options     "nosniff"         always;
    add_header X-XSS-Protection           "1; mode=block"   always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ----- Gzip Compression -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/html
        text/plain
        text/xml;

    # ----- Client Request Limits -----
    client_max_body_size 15M;   # must be >= spring.servlet.multipart.max-request-size (10MB) + overhead
    client_body_timeout  60s;
    client_header_timeout 60s;

    # ----- Proxy Defaults -----
    proxy_http_version          1.1;
    proxy_set_header Connection "";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_connect_timeout   30s;
    proxy_read_timeout      120s;
    proxy_send_timeout      120s;

    # ==========================================================================
    # /api/** — All backend API endpoints
    # ==========================================================================
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ==========================================================================
    # /api/auth/** — Stricter rate limit for auth routes
    # ==========================================================================
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ==========================================================================
    # /actuator/health — Health check endpoint (internal / load-balancer use)
    # Expose only health; do NOT expose /actuator/** publicly
    # ==========================================================================
    location = /actuator/health {
        proxy_pass http://backend;
        access_log off;
    }

    # Block all other actuator sub-paths
    location /actuator/ {
        return 403;
    }

    # ==========================================================================
    # Swagger / API Docs — restrict in production if needed
    # Comment out or IP-restrict this block before going live
    # ==========================================================================
    location ~ ^/(swagger-ui|v3/api-docs) {
        proxy_pass http://backend;
    }

    # ==========================================================================
    # Frontend — Phase 7 placeholder
    # When frontend is containerised, replace the return 503 with:
    #   root /usr/share/nginx/html;
    #   try_files $uri $uri/ /index.html;
    # ==========================================================================
    location / {
        # TODO Phase 7: serve React build artifacts
        return 503 "Frontend not deployed yet";
    }

    # ----- Custom Error Pages -----
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"status":429,"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 502 '{"status":502,"error":"Bad Gateway","message":"Service temporarily unavailable."}';
    }
}
