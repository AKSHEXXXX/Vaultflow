name: Fresh Deploy (Clean Start)

# ─────────────────────────────────────────────────────────────────────────────
# Manual workflow that does a FULL rebuild + clean deployment.
# Removes all old containers (including leftover MinIO), builds both
# backend & frontend images from scratch, and deploys to EC2.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip backend tests (faster deploy)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  EC2_HOST: "65.1.133.248"
  EC2_USER: "ubuntu"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/saas-backend
  DOCKER_FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/saas-frontend

jobs:

  # ── Run tests (optional) ───────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: saas_test
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/saas_test
          SPRING_DATASOURCE_USERNAME: saas_user
          SPRING_DATASOURCE_PASSWORD: saas_password
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: '6379'
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-south-1
          JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LW11c3QtYmUtbG9uZy1lbm91Z2gtZm9yLUhTMjU2LWFsZ29yaXRobQ==
        run: mvn test -B --no-transfer-progress -T 1C

  # ── Build & push backend Docker image ──────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn package -DskipTests -B --no-transfer-progress -T 1C

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push (no cache — fresh image)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.ci
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # No cache — ensures a completely fresh image
          no-cache: true

  # ── Build & push frontend Docker image ─────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push (no cache — fresh image)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_FRONTEND_IMAGE }}:latest
            ${{ env.DOCKER_FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=
          no-cache: true

  # ── Clean deploy to EC2 ────────────────────────────────────────────────────
  deploy:
    name: Clean Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-backend, build-frontend]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<'SSHEOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 15
            ServerAliveInterval 30
            ServerAliveCountMax 3
          SSHEOF

      - name: Sync compose & nginx config to EC2
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          EC2="${{ env.EC2_USER }}@${{ env.EC2_HOST }}"
          APP_DIR="/home/${{ env.EC2_USER }}/app"

          ssh ${SSH_OPTS} ${EC2} "mkdir -p ${APP_DIR}/nginx/certs"

          scp ${SSH_OPTS} docker-compose.prod.yml ${EC2}:${APP_DIR}/docker-compose.prod.yml
          scp ${SSH_OPTS} nginx/nginx.conf         ${EC2}:${APP_DIR}/nginx/nginx.conf

      - name: Clean deploy on EC2
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          EC2="${{ env.EC2_USER }}@${{ env.EC2_HOST }}"

          ssh ${SSH_OPTS} ${EC2} \
            DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}" \
            DOCKER_FRONTEND_IMAGE="${{ env.DOCKER_FRONTEND_IMAGE }}" \
            IMAGE_TAG="${{ github.sha }}" \
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
            DOCKER_PASSWORD="${{ secrets.DOCKER_PASSWORD }}" \
            bash << 'REMOTE_EOF'
          set -euo pipefail
          APP_DIR="/home/ubuntu/app"
          COMPOSE_FILE="docker-compose.prod.yml"

          # ── Install Docker if missing ──────────────────────────────────────
          if ! command -v docker &>/dev/null; then
            echo "--- Installing Docker ---"
            curl -fsSL https://get.docker.com | sudo sh
            sudo usermod -aG docker "${USER}"
            sudo systemctl enable --now docker
          fi

          cd "${APP_DIR}"

          # ── 1. STOP everything (including any old MinIO containers) ────────
          echo "=== Stopping ALL running containers ==="
          sudo docker compose -f "${COMPOSE_FILE}" --env-file .env.prod down --remove-orphans 2>/dev/null || true

          # Stop and remove any leftover MinIO containers by name
          for cname in saas-minio minio saas-minio-prod; do
            if sudo docker ps -a --format '{{.Names}}' | grep -qw "${cname}"; then
              echo "--- Removing leftover container: ${cname} ---"
              sudo docker rm -f "${cname}" 2>/dev/null || true
            fi
          done

          # Force-stop ALL Docker containers to free ports
          echo "=== Force-stopping any remaining containers ==="
          sudo docker stop $(sudo docker ps -aq) 2>/dev/null || true
          sudo docker rm $(sudo docker ps -aq) 2>/dev/null || true

          # Kill anything still holding port 80 or 443
          echo "=== Freeing ports 80 and 443 ==="
          sudo fuser -k 80/tcp 2>/dev/null || true
          sudo fuser -k 443/tcp 2>/dev/null || true

          # ── 2. REMOVE old MinIO images ─────────────────────────────────────
          echo "=== Removing old MinIO images ==="
          sudo docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | grep -i minio | awk '{print $2}' | xargs -r sudo docker rmi -f 2>/dev/null || true

          # ── 3. Prune ALL unused images, volumes, networks ──────────────────
          echo "=== Pruning unused Docker resources ==="
          sudo docker system prune -af --volumes 2>/dev/null || true

          # ── 4. Login & pull fresh images ───────────────────────────────────
          echo "=== Logging in to Docker Hub ==="
          echo "${DOCKER_PASSWORD}" | sudo docker login -u "${DOCKER_USERNAME}" --password-stdin

          echo "=== Pulling fresh images ==="
          DOCKER_IMAGE="${DOCKER_IMAGE}" \
          DOCKER_FRONTEND_IMAGE="${DOCKER_FRONTEND_IMAGE}" \
          IMAGE_TAG="${IMAGE_TAG}" \
            sudo docker compose -f "${COMPOSE_FILE}" --env-file .env.prod pull backend frontend

          # ── 5. Start infrastructure (postgres + redis) ─────────────────────
          echo "=== Starting postgres & redis ==="
          DOCKER_IMAGE="${DOCKER_IMAGE}" \
          DOCKER_FRONTEND_IMAGE="${DOCKER_FRONTEND_IMAGE}" \
          IMAGE_TAG="${IMAGE_TAG}" \
            sudo docker compose -f "${COMPOSE_FILE}" --env-file .env.prod up -d postgres redis

          echo "--- Waiting for postgres & redis to be healthy (up to 90s) ---"
          for i in $(seq 1 30); do
            PG=$(sudo docker inspect --format='{{.State.Health.Status}}' saas-postgres-prod 2>/dev/null || echo "starting")
            RD=$(sudo docker inspect --format='{{.State.Health.Status}}' saas-redis-prod 2>/dev/null || echo "starting")
            echo "  [${i}/30] postgres: ${PG}  redis: ${RD}"
            [ "${PG}" = "healthy" ] && [ "${RD}" = "healthy" ] && break
            sleep 3
          done

          # ── 6. Start backend ───────────────────────────────────────────────
          echo "=== Starting backend ==="
          DOCKER_IMAGE="${DOCKER_IMAGE}" \
          DOCKER_FRONTEND_IMAGE="${DOCKER_FRONTEND_IMAGE}" \
          IMAGE_TAG="${IMAGE_TAG}" \
            sudo docker compose -f "${COMPOSE_FILE}" --env-file .env.prod up -d backend

          echo "--- Waiting for backend health (up to 120s) ---"
          for i in $(seq 1 40); do
            CID=$(sudo docker compose -f "${COMPOSE_FILE}" ps -q backend 2>/dev/null || true)
            STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' "${CID}" 2>/dev/null || echo "starting")
            echo "  [${i}/40] Health: ${STATUS}"
            [ "${STATUS}" = "healthy" ] && break
            sleep 3
          done

          # ── 7. Start frontend + nginx ──────────────────────────────────────
          echo "=== Starting frontend & nginx ==="
          DOCKER_IMAGE="${DOCKER_IMAGE}" \
          DOCKER_FRONTEND_IMAGE="${DOCKER_FRONTEND_IMAGE}" \
          IMAGE_TAG="${IMAGE_TAG}" \
            sudo docker compose -f "${COMPOSE_FILE}" --env-file .env.prod up -d frontend nginx

          # ── 8. Final status ────────────────────────────────────────────────
          echo ""
          echo "=== Final container status ==="
          sudo docker compose -f "${COMPOSE_FILE}" ps
          echo ""
          echo "=== Docker images ==="
          sudo docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
          echo ""

          # Verify no MinIO remnants
          if sudo docker images | grep -i minio; then
            echo "WARNING: MinIO images still present!"
          else
            echo "✅ No MinIO images found — clean S3 deployment!"
          fi

          echo "=== Fresh deployment complete ==="
          REMOTE_EOF

      - name: Verify deployment
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          EC2="${{ env.EC2_USER }}@${{ env.EC2_HOST }}"

          echo "Waiting 30s for services to stabilize..."
          sleep 30

          echo "=== Checking backend health ==="
          ssh ${SSH_OPTS} ${EC2} "curl -sf http://localhost:8080/actuator/health || echo 'Backend not healthy yet'"

          echo ""
          echo "=== Checking frontend ==="
          ssh ${SSH_OPTS} ${EC2} "curl -sf -o /dev/null -w 'HTTP %{http_code}' http://localhost:80/ || echo 'Frontend not responding yet'"
