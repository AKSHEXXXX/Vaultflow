# =============================================================================
# .github/workflows/deploy.yml
# CI/CD Pipeline — Test → Build → Push to Docker Hub → Deploy to EC2
#
# Triggers: every push to `main`
# Jobs (in order):
#   1. test     — Run Maven tests
#   2. build    — Build & push Docker image (depends on: test)
#   3. deploy   — SSH deploy to EC2 (depends on: build)
# =============================================================================

name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # Job 1: Run Tests
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      # Spin up a real PostgreSQL for integration tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: saas_test
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Spin up Redis for rate-limit / cache tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        env:
          # Override datasource for CI test DB
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/saas_test
          SPRING_DATASOURCE_USERNAME: saas_user
          SPRING_DATASOURCE_PASSWORD: saas_password
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          # Dummy values so context loads; S3 calls are mocked in tests
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: saas-test-bucket
          JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LW11c3QtYmUtbG9uZy1lbm91Z2gtZm9yLUhTMjU2LWFsZ29yaXRobQ==
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: mvn test -B --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ============================================================
  # Job 2: Build Docker Image & Push to Docker Hub
  # Runs only on push to main (not on PRs)
  # ============================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/saas-backend
          tags: |
            # Tag with short SHA for traceability
            type=sha,format=short,prefix=sha-
            # Also tag as "latest" on main
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ secrets.DOCKER_USERNAME }}/saas-backend digest ${{ steps.build-push.outputs.digest }}"

  # ============================================================
  # Job 3: Deploy to EC2
  # Runs only on push to main after a successful build
  # ============================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ secrets.EC2_HOST }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Run deploy script on EC2
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/saas-backend
          IMAGE_TAG: sha-${{ github.sha }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key"
          SSH_KEY=~/.ssh/deploy_key bash scripts/deploy.sh

      - name: Notify success
        if: success()
        run: |
          echo "Deployed ${{ secrets.DOCKER_USERNAME }}/saas-backend:sha-${{ github.sha }} to ${{ secrets.EC2_HOST }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check the logs above."
          exit 1
