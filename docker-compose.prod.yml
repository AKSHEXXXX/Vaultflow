# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml
#
# Production stack — no LocalStack (uses real AWS S3).
# All secrets are injected via .env.prod (never committed to git).
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: saas-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (self-hosted S3-compatible object storage) ──────────────────────
  minio:
    image: minio/minio:latest
    container_name: saas-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioAdmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioSecret123}
    volumes:
      - minio_data:/data
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialiser (runs once, creates the bucket) ───────────────
  minio-init:
    image: minio/mc:latest
    container_name: saas-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-minioAdmin}
      MINIO_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-minioSecret123}
      BUCKET_NAME: ${AWS_S3_BUCKET:-saas-documents}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      /usr/bin/mc mb --ignore-existing myminio/$$BUCKET_NAME &&
      echo 'Bucket ready: '$$BUCKET_NAME"
    networks:
      - saas-internal
    restart: on-failure

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    image: ${DOCKER_IMAGE}:${IMAGE_TAG:-latest}
    container_name: saas-backend-prod
    restart: always
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Override DB/Redis/S3 hosts to point at containers on the internal network
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Point S3 client at MinIO instead of real AWS
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-saas-documents}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioAdmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioSecret123}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"    # Direct access (nginx is optional via --profile proxy)
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── React / Vite Frontend ───────────────────────────────────────────────────
  frontend:
    image: ${DOCKER_FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: saas-frontend-prod
    restart: always
    # No public ports — all traffic comes through nginx
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: saas-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro        # SSL certs (Let's Encrypt / ACM)
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - saas-internal
      - saas-external

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_logs:

networks:
  saas-internal:
    driver: bridge          # Internal services network (postgres, redis, backend)
  saas-external:
    driver: bridge           # External network for nginx proxy
