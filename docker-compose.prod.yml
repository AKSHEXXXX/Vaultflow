# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml
#
# Production stack — no LocalStack (uses real AWS S3).
# All secrets are injected via .env.prod (never committed to git).
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: saas-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    image: ${DOCKER_IMAGE}:${IMAGE_TAG:-latest}
    container_name: saas-backend-prod
    restart: always
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Override DB/Redis/S3 hosts to point at containers on the internal network
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # S3 credentials come from the EC2 IAM role automatically — no keys needed here.
      AWS_REGION: ${AWS_REGION:ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"    # Direct access (nginx is optional via --profile proxy)
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── React / Vite Frontend ───────────────────────────────────────────────────
  frontend:
    image: ${DOCKER_FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: saas-frontend-prod
    restart: always
    # No public ports — all traffic comes through nginx
    networks:
      - saas-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: saas-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro        # SSL certs (Let's Encrypt / ACM)
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - saas-internal
      - saas-external

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  saas-internal:
    driver: bridge          # Internal services network (postgres, redis, backend)
  saas-external:
    driver: bridge           # External network for nginx proxy
