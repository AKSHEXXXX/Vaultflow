spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/saas_db
    username: saas_user
    password: saas_password
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:74954359885-4hlut96sfovjhrd219tr7k646p469ot9.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

jwt:
  secret: ${JWT_SECRET:REDACTED_JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}

aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID:test}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test}
    region: ${AWS_REGION:ap-south-1}
    bucket-name: ${AWS_S3_BUCKET:saas-documents-dev}
    presigned-url-expiration: 3600
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}

# File upload limits
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB
